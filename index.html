<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII·CAM — Live Webcam to ASCII</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════
     CSS VARIABLES & RESET
  ═══════════════════════════════════════════════ */
  :root {
    --bg:          #050a05;
    --panel-bg:    rgba(0, 20, 0, 0.72);
    --border:      rgba(0, 255, 70, 0.18);
    --border-hot:  rgba(0, 255, 70, 0.55);
    --accent:      #00ff46;
    --accent-dim:  #00992b;
    --accent-glow: rgba(0,255,70,0.25);
    --text:        #b8ffcc;
    --text-dim:    #3a7a4a;
    --danger:      #ff4444;
    --orange:      #ff8c00;
    --panel-blur:  blur(18px);
    --radius:      12px;
    --radius-sm:   7px;
    --font-mono:   'Share Tech Mono', 'Courier New', monospace;
    --font-display: 'Orbitron', sans-serif;
    --transition:  0.18s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
    /* CRT scanline overlay */
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
  }

  /* ═══════════════════════════════════════════════
     GLOBAL SCANLINE EFFECT (retro mode toggles intensity)
  ═══════════════════════════════════════════════ */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 9999;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
    opacity: 0;
    transition: opacity 0.4s;
  }

  body.scanlines::before { opacity: 1; }

  /* ═══════════════════════════════════════════════
     LAYOUT
  ═══════════════════════════════════════════════ */
  #app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr 300px;
    grid-template-areas:
      "header  header"
      "output  panel"
      "footer  footer";
    min-height: 100vh;
    gap: 0;
  }

  /* ═══════════════════════════════════════════════
     HEADER
  ═══════════════════════════════════════════════ */
  header {
    grid-area: header;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,10,0,0.6);
    backdrop-filter: var(--panel-blur);
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 1.35rem;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-shadow: 0 0 22px var(--accent-glow), 0 0 60px rgba(0,255,70,0.12);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent), 0 0 20px var(--accent-glow);
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.75); }
  }

  .header-right { display: flex; align-items: center; gap: 14px; }

  .fps-badge {
    font-family: var(--font-display);
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent-dim);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 30px;
    background: rgba(0,255,70,0.05);
    min-width: 80px;
    text-align: center;
    transition: var(--transition);
  }

  .fps-badge.hot {
    color: var(--accent);
    border-color: var(--border-hot);
    box-shadow: 0 0 10px rgba(0,255,70,0.15);
  }

  /* ═══════════════════════════════════════════════
     ASCII OUTPUT AREA
  ═══════════════════════════════════════════════ */
  #output-area {
    grid-area: output;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #000;
  }

  /* Hidden video + processing canvas */
  #video { display: none; }
  #proc-canvas { display: none; }

  /* The ASCII display canvas */
  #ascii-canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
    image-rendering: pixelated;
  }

  /* Overlay when camera not started */
  #start-overlay {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    background: radial-gradient(ellipse at center, rgba(0,30,0,0.9) 0%, rgba(0,5,0,0.97) 100%);
    z-index: 10;
    transition: opacity 0.5s, visibility 0.5s;
  }

  #start-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .start-icon {
    width: 90px; height: 90px;
    border: 2px solid var(--accent-dim);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem;
    color: var(--accent);
    box-shadow: 0 0 40px rgba(0,255,70,0.15), inset 0 0 30px rgba(0,255,70,0.05);
    animation: glow-ring 2.5s ease-in-out infinite;
  }

  @keyframes glow-ring {
    0%, 100% { box-shadow: 0 0 20px rgba(0,255,70,0.15), inset 0 0 20px rgba(0,255,70,0.05); }
    50% { box-shadow: 0 0 60px rgba(0,255,70,0.35), inset 0 0 40px rgba(0,255,70,0.1); }
  }

  .start-label {
    font-family: var(--font-display);
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-align: center;
  }

  /* ═══════════════════════════════════════════════
     CONTROL PANEL
  ═══════════════════════════════════════════════ */
  #panel {
    grid-area: panel;
    background: var(--panel-bg);
    backdrop-filter: var(--panel-blur);
    border-left: 1px solid var(--border);
    padding: 20px 18px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scrollbar-width: thin;
    scrollbar-color: var(--accent-dim) transparent;
  }

  #panel::-webkit-scrollbar { width: 4px; }
  #panel::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 2px; }

  .panel-section {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 14px 16px;
    background: rgba(0,255,70,0.025);
    transition: border-color var(--transition);
  }

  .panel-section:hover { border-color: rgba(0,255,70,0.3); }

  .section-title {
    font-family: var(--font-display);
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: var(--accent-dim);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ── Buttons ── */
  .btn {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    border: 1px solid var(--border-hot);
    border-radius: var(--radius-sm);
    padding: 9px 14px;
    background: rgba(0,255,70,0.07);
    color: var(--accent);
    width: 100%;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,255,70,0.12), transparent);
    opacity: 0;
    transition: opacity var(--transition);
  }

  .btn:hover { background: rgba(0,255,70,0.14); box-shadow: 0 0 18px rgba(0,255,70,0.2); }
  .btn:hover::before { opacity: 1; }
  .btn:active { transform: scale(0.97); }

  .btn.primary {
    background: rgba(0,255,70,0.15);
    border-color: var(--accent);
    box-shadow: 0 0 14px rgba(0,255,70,0.18);
    font-weight: 700;
  }

  .btn.danger {
    border-color: rgba(255,68,68,0.5);
    color: var(--danger);
    background: rgba(255,68,68,0.07);
  }

  .btn.danger:hover { background: rgba(255,68,68,0.14); box-shadow: 0 0 18px rgba(255,68,68,0.2); }

  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }

  /* ── Select ── */
  .select-wrap { position: relative; }

  select {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    letter-spacing: 0.03em;
    width: 100%;
    padding: 8px 30px 8px 10px;
    background: rgba(0,10,0,0.7);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    appearance: none;
    cursor: pointer;
    transition: border-color var(--transition);
  }

  select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 10px rgba(0,255,70,0.15); }

  .select-arrow {
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--accent-dim);
    pointer-events: none;
    font-size: 0.6rem;
  }

  select option { background: #071007; }

  /* ── Slider ── */
  .slider-group {
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-bottom: 2px;
  }

  .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.72rem;
    color: var(--text-dim);
  }

  .slider-label span:last-child {
    font-family: var(--font-display);
    font-size: 0.62rem;
    color: var(--accent);
    min-width: 30px;
    text-align: right;
  }

  input[type=range] {
    width: 100%;
    height: 3px;
    appearance: none;
    background: linear-gradient(90deg, var(--accent-dim) 0%, var(--accent-dim) var(--pct, 50%), rgba(0,255,70,0.1) var(--pct, 50%));
    border-radius: 2px;
    cursor: pointer;
    transition: background var(--transition);
  }

  input[type=range]::-webkit-slider-thumb {
    appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    border: 2px solid #050a05;
    transition: transform var(--transition), box-shadow var(--transition);
  }

  input[type=range]:hover::-webkit-slider-thumb {
    transform: scale(1.3);
    box-shadow: 0 0 16px var(--accent);
  }

  input[type=range]::-moz-range-thumb {
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    border: 2px solid #050a05;
    cursor: pointer;
  }

  /* ── Color Mode Pills ── */
  .color-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
  }

  .color-pill {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 7px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: rgba(0,10,0,0.6);
    color: var(--text-dim);
    cursor: pointer;
    text-align: center;
    transition: var(--transition);
    letter-spacing: 0.04em;
  }

  .color-pill:hover { border-color: rgba(0,255,70,0.4); color: var(--text); }
  .color-pill.active { border-color: currentColor; background: rgba(0,255,70,0.1); font-weight: 700; }
  .color-pill[data-color="green"].active { color: #00ff46; box-shadow: 0 0 12px rgba(0,255,70,0.2); }
  .color-pill[data-color="bw"].active { color: #e0e0e0; box-shadow: 0 0 12px rgba(224,224,224,0.15); }
  .color-pill[data-color="orange"].active { color: var(--orange); box-shadow: 0 0 12px rgba(255,140,0,0.2); }
  .color-pill[data-color="full"].active { background: linear-gradient(135deg,rgba(255,0,100,0.1),rgba(0,100,255,0.1)); border-color: #8888ff; color: #aaaaff; }

  /* ── Resolution Pills ── */
  .res-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }

  .res-pill {
    font-family: var(--font-display);
    font-size: 0.58rem;
    padding: 6px 4px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: rgba(0,10,0,0.6);
    color: var(--text-dim);
    cursor: pointer;
    text-align: center;
    transition: var(--transition);
    letter-spacing: 0.06em;
  }

  .res-pill:hover { border-color: rgba(0,255,70,0.4); color: var(--text); }
  .res-pill.active { border-color: var(--accent-dim); color: var(--accent); background: rgba(0,255,70,0.08); }

  /* ── Toggle ── */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.74rem;
    color: var(--text-dim);
    cursor: pointer;
    padding: 3px 0;
    user-select: none;
    transition: color var(--transition);
  }

  .toggle-row:hover { color: var(--text); }

  .toggle {
    width: 36px; height: 19px;
    background: rgba(0,255,70,0.08);
    border: 1px solid var(--border);
    border-radius: 30px;
    position: relative;
    transition: var(--transition);
    flex-shrink: 0;
  }

  .toggle::after {
    content: '';
    position: absolute;
    left: 3px; top: 3px;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: var(--transition);
  }

  .toggle.on { background: rgba(0,255,70,0.2); border-color: var(--accent-dim); }
  .toggle.on::after { background: var(--accent); left: 20px; box-shadow: 0 0 8px var(--accent-glow); }

  /* ═══════════════════════════════════════════════
     FOOTER
  ═══════════════════════════════════════════════ */
  footer {
    grid-area: footer;
    border-top: 1px solid var(--border);
    background: rgba(0,10,0,0.5);
    backdrop-filter: var(--panel-blur);
    padding: 8px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  .status-bar { display: flex; align-items: center; gap: 18px; }

  .status-item {
    display: flex; align-items: center; gap: 6px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: var(--transition);
  }

  .status-dot.live {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 1.4s ease-in-out infinite;
  }

  /* ═══════════════════════════════════════════════
     TOAST NOTIFICATION
  ═══════════════════════════════════════════════ */
  #toast {
    position: fixed;
    bottom: 60px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,30,0,0.92);
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-size: 0.8rem;
    padding: 10px 22px;
    border-radius: 30px;
    letter-spacing: 0.06em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 30px rgba(0,255,70,0.2);
    z-index: 9999;
  }

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ═══════════════════════════════════════════════
     RESPONSIVE
  ═══════════════════════════════════════════════ */
  @media (max-width: 820px) {
    #app {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr auto;
      grid-template-areas:
        "header"
        "panel"
        "output"
        "footer";
    }

    #panel {
      border-left: none;
      border-bottom: 1px solid var(--border);
      max-height: 380px;
    }

    #output-area { min-height: 50vw; }

    header { padding: 10px 16px; }
    footer { padding: 6px 16px; flex-wrap: wrap; gap: 6px; }
  }

  @media (max-width: 480px) {
    .logo { font-size: 1rem; }
    #panel { max-height: 340px; padding: 14px 12px; }
  }
</style>
</head>
<body>

<div id="app">

  <!-- ═══════════ HEADER ═══════════ -->
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      ASCII·CAM
    </div>
    <div class="header-right">
      <div class="fps-badge" id="fps-badge">-- FPS</div>
    </div>
  </header>

  <!-- ═══════════ ASCII OUTPUT ═══════════ -->
  <div id="output-area">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="proc-canvas"></canvas>
    <canvas id="ascii-canvas"></canvas>

    <div id="start-overlay">
      <div class="start-icon">◉</div>
      <div class="start-label">WEBCAM REQUIRED<br>Click "Start Camera" to begin</div>
    </div>
  </div>

  <!-- ═══════════ CONTROL PANEL ═══════════ -->
  <div id="panel">

    <!-- Camera Controls -->
    <div class="panel-section">
      <div class="section-title">Camera</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn primary" id="btn-start">▶ Start Camera</button>
        <button class="btn danger" id="btn-stop" disabled>■ Stop Camera</button>
        <button class="btn" id="btn-capture">⊡ Capture Screenshot</button>
      </div>
    </div>

    <!-- Character Set -->
    <div class="panel-section">
      <div class="section-title">Character Set</div>
      <div class="select-wrap">
        <select id="sel-charset">
          <option value="simple">Simple  @#S%?*+;:,.</option>
          <option value="complex" selected>Complex  @#$%&W...full</option>
          <option value="binary">Binary  01</option>
          <option value="blocks">Blocks  ░▒▓█</option>
          <option value="braille">Dots  ·∙•●◉</option>
        </select>
        <span class="select-arrow">▼</span>
      </div>
    </div>

    <!-- Color Mode -->
    <div class="panel-section">
      <div class="section-title">Color Mode</div>
      <div class="color-grid">
        <div class="color-pill active" data-color="green">🟢 Matrix</div>
        <div class="color-pill" data-color="bw">⬜ Mono</div>
        <div class="color-pill" data-color="orange">🟠 Retro</div>
        <div class="color-pill" data-color="full">🌈 Color</div>
      </div>
    </div>

    <!-- Resolution -->
    <div class="panel-section">
      <div class="section-title">Resolution</div>
      <div class="res-grid">
        <div class="res-pill" data-res="low">LOW<br><small>80×50</small></div>
        <div class="res-pill active" data-res="med">MED<br><small>120×75</small></div>
        <div class="res-pill" data-res="high">HIGH<br><small>180×110</small></div>
      </div>
    </div>

    <!-- Image Controls -->
    <div class="panel-section">
      <div class="section-title">Image</div>

      <div class="slider-group">
        <div class="slider-label"><span>Brightness</span><span id="val-brightness">0</span></div>
        <input type="range" id="sl-brightness" min="-100" max="100" value="0">
      </div>

      <div class="slider-group" style="margin-top:10px">
        <div class="slider-label"><span>Contrast</span><span id="val-contrast">1.0</span></div>
        <input type="range" id="sl-contrast" min="50" max="250" value="100">
      </div>

      <div class="slider-group" style="margin-top:10px">
        <div class="slider-label"><span>Gain</span><span id="val-gain">1.0</span></div>
        <input type="range" id="sl-gain" min="50" max="200" value="100">
      </div>

      <div class="slider-group" style="margin-top:10px">
        <div class="slider-label"><span>Font Size</span><span id="val-fontsize">8</span></div>
        <input type="range" id="sl-fontsize" min="5" max="16" value="8">
      </div>
    </div>

    <!-- Effects -->
    <div class="panel-section">
      <div class="section-title">Effects</div>

      <div class="toggle-row" id="tog-invert">
        <span>Invert</span>
        <div class="toggle" id="tog-invert-knob"></div>
      </div>

      <div class="toggle-row" id="tog-mirror" style="margin-top:10px">
        <span>Mirror</span>
        <div class="toggle on" id="tog-mirror-knob"></div>
      </div>

      <div class="toggle-row" id="tog-scanlines" style="margin-top:10px">
        <span>Scanlines</span>
        <div class="toggle" id="tog-scanlines-knob"></div>
      </div>
    </div>

  </div><!-- /panel -->

  <!-- ═══════════ FOOTER ═══════════ -->
  <footer>
    <div class="status-bar">
      <div class="status-item">
        <div class="status-dot" id="cam-dot"></div>
        <span id="cam-status">NO SIGNAL</span>
      </div>
      <div class="status-item" id="res-status">-- × --</div>
    </div>
    <span style="opacity:0.4">ASCII·CAM v1.0</span>
  </footer>

</div><!-- /app -->

<!-- Toast -->
<div id="toast"></div>

<!-- Hidden elements -->
<video id="video" autoplay playsinline muted style="display:none"></video>
<canvas id="proc-canvas" style="display:none"></canvas>

<script>
/* ═══════════════════════════════════════════════════════════
   ASCII·CAM — Production-grade webcam-to-ASCII renderer
   
   Architecture:
     VideoManager    — getUserMedia, stream lifecycle
     AsciiConverter  — pixel → char lookup, per-frame logic
     CanvasRenderer  — draws ASCII chars to output canvas
     UIController    — binds controls, updates state
     App             — orchestrates RAF loop, wires everything
   ═══════════════════════════════════════════════════════════ */

/* ── Character Sets ─────────────────────────────────────── */
const CHARSETS = {
  simple:  '@#S%?*+;:,. ',
  complex: '@#$%&WM8B0QOZXYUJCLft/\\|()1{}[]?-_+~<>i!lI;:,"^`\'. ',
  binary:  '01 ',
  blocks:  '█▓▒░ ',
  braille: '●◉•∙· ',
};

/* ── Resolution Presets ─────────────────────────────────── */
const RESOLUTIONS = {
  low:  { cols: 80,  rows: 50  },
  med:  { cols: 120, rows: 75  },
  high: { cols: 180, rows: 110 },
};

/* ══════════════════════════════════════════════════════════
   STATE — single source of truth
   ══════════════════════════════════════════════════════════ */
const state = {
  running:    false,
  charset:    'complex',
  colorMode:  'green',   // green | bw | orange | full
  resolution: 'med',
  brightness: 0,
  contrast:   1.0,
  gain:       1.0,
  fontSize:   8,
  invert:     false,
  mirror:     true,
  scanlines:  false,
};

/* ══════════════════════════════════════════════════════════
   VideoManager
   ══════════════════════════════════════════════════════════ */
const VideoManager = (() => {
  const video = document.getElementById('video');
  let stream = null;

  async function start() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
      video.srcObject = stream;
      await new Promise(r => video.onloadedmetadata = r);
      video.play();
      return true;
    } catch (e) {
      console.error('Camera error:', e);
      return false;
    }
  }

  function stop() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
  }

  function ready() { return video.readyState >= 2; }
  function getVideo() { return video; }
  function getSize() { return { w: video.videoWidth, h: video.videoHeight }; }

  return { start, stop, ready, getVideo, getSize };
})();

/* ══════════════════════════════════════════════════════════
   AsciiConverter — renders a video frame to ASCII on a canvas
   ══════════════════════════════════════════════════════════ */
const AsciiConverter = (() => {
  const procCanvas = document.getElementById('proc-canvas');
  const procCtx = procCanvas.getContext('2d', { willReadFrequently: true });

  /**
   * Draw the current video frame to the processing canvas (downscaled),
   * read pixel data, map each pixel to an ASCII char + colour.
   * Returns an array of rows, each row = array of {char, r, g, b}.
   */
  function processFrame(video, st) {
    const res = RESOLUTIONS[st.resolution];
    const cols = res.cols;
    const rows = res.rows;

    procCanvas.width  = cols;
    procCanvas.height = rows;

    procCtx.save();

    // Mirror horizontally if enabled
    if (st.mirror) {
      procCtx.translate(cols, 0);
      procCtx.scale(-1, 1);
    }

    // Apply contrast via globalAlpha / filter (CSS filter approach)
    procCtx.filter = `brightness(${1 + st.brightness / 100}) contrast(${st.contrast})`;
    procCtx.drawImage(video, 0, 0, cols, rows);
    procCtx.restore();

    const imageData = procCtx.getImageData(0, 0, cols, rows);
    const data = imageData.data;

    const chars = CHARSETS[st.charset];
    const charCount = chars.length;
    const gain = st.gain;
    const invert = st.invert;

    // Build 2D result grid
    const grid = [];

    for (let row = 0; row < rows; row++) {
      const rowArr = [];
      for (let col = 0; col < cols; col++) {
        const idx = (row * cols + col) * 4;
        let r = data[idx];
        let g = data[idx + 1];
        let b = data[idx + 2];

        // Luminance (ITU-R BT.709 weighted)
        let lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;

        // Apply gain
        lum = Math.min(255, lum * gain);

        if (invert) lum = 255 - lum;

        // Map luminance → char index
        const charIdx = Math.floor((lum / 255) * (charCount - 1));
        const char = chars[charIdx] || ' ';

        rowArr.push({ char, r, g, b, lum });
      }
      grid.push(rowArr);
    }

    return grid;
  }

  return { processFrame };
})();

/* ══════════════════════════════════════════════════════════
   CanvasRenderer — paints ASCII grid to the output canvas
   ══════════════════════════════════════════════════════════ */
const CanvasRenderer = (() => {
  const canvas = document.getElementById('ascii-canvas');
  const ctx = canvas.getContext('2d');

  // Colour lookup per mode
  function getColor(mode, r, g, b, lum) {
    switch (mode) {
      case 'green':  return `hsl(138,100%,${Math.round(20 + (lum/255)*55)}%)`;
      case 'bw':     return `rgb(${lum},${lum},${lum})`;
      case 'orange': return `hsl(32,100%,${Math.round(18 + (lum/255)*65)}%)`;
      case 'full':   return `rgb(${r},${g},${b})`;
      default:       return '#00ff46';
    }
  }

  function render(grid, st) {
    if (!grid || grid.length === 0) return;

    const rows = grid.length;
    const cols = grid[0].length;
    const fs = st.fontSize;

    // Monospace char cells: width ≈ 60% of height for most mono fonts
    const cellW = fs * 0.6;
    const cellH = fs;

    const canvasW = Math.ceil(cols * cellW);
    const canvasH = Math.ceil(rows * cellH);

    // Resize canvas only when dimensions change (avoid expensive resizes every frame)
    if (canvas.width !== canvasW || canvas.height !== canvasH) {
      canvas.width  = canvasW;
      canvas.height = canvasH;
    }

    // Black background
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, canvasW, canvasH);

    ctx.font = `${fs}px 'Share Tech Mono', 'Courier New', monospace`;
    ctx.textBaseline = 'top';

    const colorMode = st.colorMode;

    // Batch draws by colour when possible (in green/bw/orange mode, we CAN batch
    // but colour varies per-pixel, so we just draw char-by-char — still fast for <20k chars)
    for (let row = 0; row < rows; row++) {
      const y = row * cellH;
      for (let col = 0; col < cols; col++) {
        const cell = grid[row][col];
        if (cell.char === ' ') continue; // skip spaces — bg is already black

        ctx.fillStyle = getColor(colorMode, cell.r, cell.g, cell.b, cell.lum);
        ctx.fillText(cell.char, col * cellW, y);
      }
    }
  }

  // Export current canvas as PNG download
  function exportPNG() {
    return canvas.toDataURL('image/png');
  }

  function getCanvas() { return canvas; }

  return { render, exportPNG, getCanvas };
})();

/* ══════════════════════════════════════════════════════════
   UIController — binds all controls to state
   ══════════════════════════════════════════════════════════ */
const UIController = (() => {
  // Slider helper: keeps gradient track filled
  function bindSlider(id, stateKey, transform, displayKey, fmt) {
    const el = document.getElementById(id);
    const valEl = document.getElementById(displayKey);

    function update() {
      const raw = parseFloat(el.value);
      const val = transform ? transform(raw) : raw;
      state[stateKey] = val;
      valEl.textContent = fmt ? fmt(val) : val;
      // Update track fill via CSS custom prop
      const min = parseFloat(el.min);
      const max = parseFloat(el.max);
      const pct = ((raw - min) / (max - min)) * 100;
      el.style.setProperty('--pct', pct + '%');
    }
    el.addEventListener('input', update);
    update(); // init
  }

  function bindToggle(rowId, knobId, stateKey, onChange) {
    const knob = document.getElementById(knobId);
    document.getElementById(rowId).addEventListener('click', () => {
      state[stateKey] = !state[stateKey];
      knob.classList.toggle('on', state[stateKey]);
      if (onChange) onChange(state[stateKey]);
    });
    // init
    knob.classList.toggle('on', state[stateKey]);
  }

  function init() {
    // Sliders
    bindSlider('sl-brightness', 'brightness', v => Math.round(v), 'val-brightness', v => (v >= 0 ? '+' : '') + v);
    bindSlider('sl-contrast',   'contrast',   v => (v/100).toFixed(1), 'val-contrast', v => v);
    bindSlider('sl-gain',       'gain',       v => (v/100).toFixed(1), 'val-gain', v => v);
    bindSlider('sl-fontsize',   'fontSize',   v => Math.round(v), 'val-fontsize', v => v + 'px');

    // Charset dropdown
    document.getElementById('sel-charset').addEventListener('change', e => {
      state.charset = e.target.value;
    });

    // Color pills
    document.querySelectorAll('.color-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.color-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        state.colorMode = pill.dataset.color;
        // Update CSS accent for retro mode
        updateAccentColor(state.colorMode);
      });
    });

    // Resolution pills
    document.querySelectorAll('.res-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.res-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        state.resolution = pill.dataset.res;
        updateResStatus();
      });
    });

    // Toggles
    bindToggle('tog-invert', 'tog-invert-knob', 'invert');
    bindToggle('tog-mirror', 'tog-mirror-knob', 'mirror');
    bindToggle('tog-scanlines', 'tog-scanlines-knob', 'scanlines', (on) => {
      document.body.classList.toggle('scanlines', on);
    });

    updateResStatus();
  }

  function updateAccentColor(mode) {
    const root = document.documentElement;
    if (mode === 'orange') {
      root.style.setProperty('--accent', '#ff8c00');
      root.style.setProperty('--accent-dim', '#cc6600');
      root.style.setProperty('--accent-glow', 'rgba(255,140,0,0.25)');
    } else if (mode === 'bw') {
      root.style.setProperty('--accent', '#cccccc');
      root.style.setProperty('--accent-dim', '#888888');
      root.style.setProperty('--accent-glow', 'rgba(200,200,200,0.2)');
    } else {
      root.style.setProperty('--accent', '#00ff46');
      root.style.setProperty('--accent-dim', '#00992b');
      root.style.setProperty('--accent-glow', 'rgba(0,255,70,0.25)');
    }
  }

  function updateResStatus() {
    const res = RESOLUTIONS[state.resolution];
    document.getElementById('res-status').textContent = `${res.cols} × ${res.rows}`;
  }

  function setCameraUI(live) {
    document.getElementById('btn-start').disabled = live;
    document.getElementById('btn-stop').disabled  = !live;
    document.getElementById('cam-dot').classList.toggle('live', live);
    document.getElementById('cam-status').textContent = live ? 'LIVE' : 'NO SIGNAL';
    document.getElementById('start-overlay').classList.toggle('hidden', live);
  }

  return { init, setCameraUI };
})();

/* ══════════════════════════════════════════════════════════
   Toast helper
   ══════════════════════════════════════════════════════════ */
function showToast(msg, duration = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), duration);
}

/* ══════════════════════════════════════════════════════════
   App — RAF loop + orchestration
   ══════════════════════════════════════════════════════════ */
const App = (() => {
  let rafId = null;
  let fpsFrames = 0;
  let fpsLast = performance.now();
  const fpsBadge = document.getElementById('fps-badge');

  function loop() {
    if (!state.running) return;
    rafId = requestAnimationFrame(loop);

    if (!VideoManager.ready()) return;

    const video = VideoManager.getVideo();
    const grid  = AsciiConverter.processFrame(video, state);
    CanvasRenderer.render(grid, state);

    // FPS counter (update every ~0.5s)
    fpsFrames++;
    const now = performance.now();
    const elapsed = now - fpsLast;
    if (elapsed >= 500) {
      const fps = Math.round((fpsFrames / elapsed) * 1000);
      fpsBadge.textContent = fps + ' FPS';
      fpsBadge.classList.toggle('hot', fps >= 28);
      fpsFrames = 0;
      fpsLast = now;
    }
  }

  async function start() {
    const ok = await VideoManager.start();
    if (!ok) {
      showToast('⚠ Camera access denied or unavailable', 3500);
      return;
    }
    state.running = true;
    UIController.setCameraUI(true);
    showToast('▶ Camera started');
    loop();
  }

  function stop() {
    state.running = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    VideoManager.stop();
    UIController.setCameraUI(false);
    fpsBadge.textContent = '-- FPS';
    fpsBadge.classList.remove('hot');
    showToast('■ Camera stopped');
  }

  function capture() {
    if (!state.running) { showToast('⚠ Start camera first'); return; }
    const dataUrl = CanvasRenderer.exportPNG();
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `ascii-cam-${Date.now()}.png`;
    a.click();
    showToast('⊡ Screenshot saved!');
  }

  function init() {
    UIController.init();

    document.getElementById('btn-start').addEventListener('click', start);
    document.getElementById('btn-stop').addEventListener('click', stop);
    document.getElementById('btn-capture').addEventListener('click', capture);

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && !e.repeat) {
        e.preventDefault();
        state.running ? stop() : start();
      }
      if (e.code === 'KeyS' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        capture();
      }
    });

    // Fit canvas to container on resize
    window.addEventListener('resize', fitCanvas);
    fitCanvas();
  }

  function fitCanvas() {
    // The canvas auto-sizes via CSS max-width/max-height — nothing extra needed,
    // but we ensure the output area fills correctly on mobile.
    const area = document.getElementById('output-area');
    const canvas = CanvasRenderer.getCanvas();
    if (canvas) {
      canvas.style.maxWidth  = area.clientWidth  + 'px';
      canvas.style.maxHeight = area.clientHeight + 'px';
    }
  }

  return { init };
})();

/* ── Boot ────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
